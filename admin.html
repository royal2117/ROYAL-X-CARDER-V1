<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="admin-wrap">

  <h1>🔥 ROYAL X ADMIN PANEL</h1>

  <!-- STATS -->
  <div class="stats">

    <div class="card">
      <h2 id="totalRequests">0</h2>
      <p>Total Requests</p>
    </div>

    <div class="card">
      <h2 id="pendingCount">0</h2>
      <p>Pending</p>
    </div>

    <div class="card">
      <h2 id="approvedCount">0</h2>
      <p>Approved</p>
    </div>

    <div class="card">
      <h2 id="rejectedCount">0</h2>
      <p>Rejected</p>
    </div>

  </div>

  <!-- REQUESTS -->
  <div id="adminRequests"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
